version: '3.8'

# ── Dokploy deployment ────────────────────────────────────────────────────────
# Dokploy manages domain routing through its UI (Compose → Domains tab).
# Set these in Dokploy UI (Compose → Environment):
#   DOMAIN                    e.g. filepro.neobize.com
#   REDIS_PASSWORD            strong random password
#   STRIPE_SECRET_KEY         sk_live_... (optional)
#   STRIPE_WEBHOOK_SECRET     whsec_...  (optional)
#   STRIPE_PUBLISHABLE_KEY    pk_live_... (optional)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV:                production
      PORT:                    5000
      REDIS_HOST:              redis
      REDIS_PORT:              6379
      REDIS_PASSWORD:          ${REDIS_PASSWORD:-changeme_redis_password}
      ALLOWED_ORIGINS:         https://${DOMAIN:-localhost},https://www.${DOMAIN:-localhost}
      FRONTEND_URL:            https://${DOMAIN:-localhost}
      STRIPE_SECRET_KEY:       ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:   ${STRIPE_WEBHOOK_SECRET:-}
      RATE_LIMIT_WINDOW_MS:    900000
      RATE_LIMIT_MAX_REQUESTS: 100
      FILE_EXPIRY_HOURS:       1
    volumes:
      - backend-uploads:/app/uploads
      - backend-outputs:/app/outputs
      - backend-logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

  # ── Queue Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: node src/workers/processor.js
    environment:
      NODE_ENV:          production
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD:-changeme_redis_password}
      FILE_EXPIRY_HOURS: 1
    volumes:
      - backend-uploads:/app/uploads
      - backend-outputs:/app/outputs
      - backend-logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NODE_ENV:    production
      BACKEND_URL: http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
  backend-uploads:
  backend-outputs:
  backend-logs:
