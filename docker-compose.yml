version: '3.8'

# ── Copy this file to your VPS, then run:
#    DOMAIN=yourdomain.com docker-compose up -d --build
# Or set DOMAIN in a .env file at the project root.

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: filepro-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filepro-backend
    environment:
      NODE_ENV:          production
      PORT:              5000
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      REDIS_PASSWORD:    ${REDIS_PASSWORD:-changeme_redis_password}
      ALLOWED_ORIGINS:   https://${DOMAIN},https://www.${DOMAIN}
      FRONTEND_URL:      https://${DOMAIN}
      STRIPE_SECRET_KEY:      ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET:  ${STRIPE_WEBHOOK_SECRET:-}
      RATE_LIMIT_WINDOW_MS:   900000
      RATE_LIMIT_MAX_REQUESTS: 100
      FILE_EXPIRY_HOURS: 1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Queue Worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: filepro-worker
    command: node src/workers/processor.js
    environment:
      NODE_ENV:       production
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_password}
      FILE_EXPIRY_HOURS: 1
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/outputs:/app/outputs
      - ./backend/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js bundle at build time
        NEXT_PUBLIC_API_BASE_URL: https://${DOMAIN}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    container_name: filepro-frontend
    environment:
      NODE_ENV: production
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: filepro-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:

networks:
  default:
    name: filepro-network
